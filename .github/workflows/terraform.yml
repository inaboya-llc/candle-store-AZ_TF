name: "Terraform Azure Automation"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select the Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: "Select the target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  terraform:
    name: "Azure TF ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})"
    runs-on: ubuntu-latest

    env:
      # Dynamically map 'dev' to 'az-candle-store-dev' for TFC mapping
      TF_WORKSPACE: "az-candle-store-${{ github.event.inputs.environment }}"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -input=false

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -auto-approve -input=false

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -auto-approve -input=false
