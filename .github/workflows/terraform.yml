name: "Terraform Azure Automation"

name: "Terraform Azure Automation"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select the Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: "Select the target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
  
  # 👈 Add this block to catch the handshake from the app repo
  repository_dispatch:
    types: [deploy-triggered-by-app]

jobs:
  terraform:
    # Fallback to 'apply' and 'dev' if triggered via repository dispatch
    name: "Azure TF ${{ github.event.inputs.action || 'apply' }} (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    
    env:
      # Dynamically map environment or default to dev
      TF_WORKSPACE: "az-candle-store-${{ github.event.inputs.environment || 'dev' }}"
      # 👈 Catch the incoming image tag from the app repo payload
      TF_VAR_web_app_image_tag: ${{ github.event.client_payload.image_tag || 'latest' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      # Update plans to run on manual trigger OR if explicitly requested
      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -input=false

      # Adjust Apply to run on manual 'apply' OR via the repository dispatch handshake
      - name: Terraform Apply
        if: github.event.inputs.action == 'apply' || github.event_name == 'repository_dispatch'
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform apply -var-file="environments/$ENV_NAME.tfvars" -var="image_tag=${{ env.TF_VAR_web_app_image_tag }}" -auto-approve -input=false

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -auto-approve -input=false
